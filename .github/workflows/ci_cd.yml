name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 10 * * *"     # Запуск каждый день в 10:00
    # - cron: "0 * * * *"     # Запуск каждый час
    # - cron: "* * * * *"     # Запуск каждую минуту

jobs:

  # Тесты
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python run_tests.py

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: logs/

  # Запуск обучения, только после тестов
  train:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download previous artifacts
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: ci_cd.yml
          name: training-artifacts
          path: .
          workflow_conclusion: success
          branch: main
        continue-on-error: true   # при первом запуске игнорируем ошибку, так как нет сохраненных данных

      - name: Run training (one batch)
        run: python run.py -mode "update"

      - name: Upload training artifacts
        uses: actions/upload-artifact@v4
        with:
          name: training-artifacts
          path: |
            models/
            data/raw/
            reports/

      - name: Upload logs
        uses: actions/upload-artifact@v4
        with:
          name: training-logs
          path: logs/